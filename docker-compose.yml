version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./infra/database
    image: ${REGISTRY_OWNER:-sentient-retention}/sentient-postgres:latest
    container_name: sentient-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentient_db}
      POSTGRES_USER: ${POSTGRES_USER:-db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentient-network

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: sentient-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentient-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    image: ${REGISTRY_OWNER:-sentient-retention}/sentient-backend:latest
    container_name: sentient-backend
    environment:
      PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: http://ml-service:8001
      AGENTIC_AI_URL: http://agentic-ai:8002
      NODE_ENV: production
      API_VERSION: v1
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis
      - ml-service
      - agentic-ai
    networks:
      - sentient-network

  # Agentic AI Engine
  agentic-ai:
    build:
      context: ./agents
    image: ${REGISTRY_OWNER:-sentient-retention}/sentient-agentic-ai:latest
    container_name: sentient-agentic-ai
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "${AGENTIC_AI_PORT:-8002}:8002"
    depends_on:
      - postgres
      - redis
    networks:
      - sentient-network

  # ML Prediction Service
  ml-service:
    build:
      context: ./simulation/ml-service
    image: ${REGISTRY_OWNER:-sentient-retention}/sentient-ml-service:latest
    container_name: sentient-ml-service
    environment:
      PORT: ${ML_SERVICE_PORT:-8001}
      HOST: 0.0.0.0
    ports:
      - "${ML_SERVICE_PORT:-8001}:8001"
    networks:
      - sentient-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    image: ${REGISTRY_OWNER:-sentient-retention}/sentient-frontend:latest
    container_name: sentient-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - sentient-network

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: sentient-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - sentient-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: sentient-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sentient-network

  # NGINX Entrypoint
  nginx:
    image: nginx:alpine
    container_name: sentient-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sentient-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  sentient-network:
    driver: bridge