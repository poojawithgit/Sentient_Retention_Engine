version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build: ../database
    container_name: sentient-postgres
    environment:
      POSTGRES_DB: sentient_retention
      POSTGRES_USER: sentient_user
      POSTGRES_PASSWORD: sentient_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sentient-network

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: sentient-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sentient-network

  # Backend API
  backend:
    build: ../backend
    container_name: sentient-backend
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://sentient_user:sentient_pass@postgres:5432/sentient_retention
      REDIS_URL: redis://redis:6379
      PREDICTION_SERVICE_URL: http://prediction-service:8002
      AGENT_SERVICE_URL: http://agent-service:8003
      SIMULATION_SERVICE_URL: http://simulation-service:8004
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - prediction-service
      - agent-service
      - simulation-service
    networks:
      - sentient-network

  # Agentic AI Service (original)
  agentic-ai:
    build: ../agentic-ai
    container_name: sentient-agentic-ai
    environment:
      DATABASE_URL: postgresql://sentient_user:sentient_pass@postgres:5432/sentient_retention
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY:-placeholder-key}
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
    networks:
      - sentient-network

  # Prediction Service
  prediction-service:
    build: ../prediction-service
    container_name: sentient-prediction
    environment:
      DATABASE_URL: postgresql://sentient_user:sentient_pass@postgres:5432/sentient_retention
    ports:
      - "8002:8002"
    depends_on:
      - postgres
    networks:
      - sentient-network

  # Agent Service
  agent-service:
    build: ../agent-service
    container_name: sentient-agent
    environment:
      DATABASE_URL: postgresql://sentient_user:sentient_pass@postgres:5432/sentient_retention
      PREDICTION_SERVICE_URL: http://prediction-service:8002
    ports:
      - "8003:8003"
    depends_on:
      - postgres
      - prediction-service
    networks:
      - sentient-network

  # Simulation Service
  simulation-service:
    build: ../simulation-service
    container_name: sentient-simulation
    ports:
      - "8004:8004"
    networks:
      - sentient-network

  # Frontend
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: sentient-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sentient-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: sentient-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - sentient-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: sentient-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - sentient-network

  # NGINX Load Balancer
  nginx:
    image: nginx:alpine
    container_name: sentient-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - sentient-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  sentient-network:
    driver: bridge