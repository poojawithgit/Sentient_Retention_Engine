global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'sentient-backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'sentient-prediction'
    static_configs:
      - targets: ['prediction-service:8002']

  - job_name: 'sentient-agent'
    static_configs:
      - targets: ['agent-service:8003']

  - job_name: 'sentient-simulation'
    static_configs:
      - targets: ['simulation-service:8004']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']